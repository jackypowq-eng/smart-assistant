<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Assistant - 聊天</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 30px auto; padding: 0 20px; background: #f9fafb; }
        h1 { color: #1e293b; display: flex; align-items: center; gap: 10px; }
        .version-badge { font-size: 14px; background: #e2e8f0; padding: 2px 8px; border-radius: 20px; }
        #chat-container { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); overflow: hidden; }
        #messages { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; word-wrap: break-word; }
        .user-message { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
        .bot-message { align-self: flex-start; background: #f1f5f9; color: #0f172a; border-bottom-left-radius: 4px; }
        .error-message { align-self: flex-start; background: #fee2e2; color: #b91c1c; }
        .input-area { display: flex; padding: 16px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        #message-input { flex: 1; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 24px; font-size: 15px; outline: none; transition: border 0.2s; }
        #message-input:focus { border-color: #2563eb; }
        #send-btn { margin-left: 12px; padding: 0 24px; background: #2563eb; color: white; border: none; border-radius: 24px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        #send-btn:hover { background: #1d4ed8; }
        #send-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { padding: 8px 20px; font-size: 14px; color: #64748b; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <h1>🤖 Smart Assistant</h1>
    <div id="chat-container">
        <div class="status" id="status">✅ 就绪</div>
        <div id="messages">
            <div class="message bot-message">👋 你好！我是智能助手，有什么可以帮你的？</div>
        </div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="输入消息..." autofocus />
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('status');

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            sendBtn.disabled = true;
            statusDiv.textContent = '⏳ 思考中...';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                addMessage(data.response, 'bot');
                statusDiv.textContent = '✅ 就绪';
            } catch (error) {
                addMessage(`❌ 请求失败: ${error.message}`, 'error');
                statusDiv.textContent = '⚠️ 连接错误';
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function addMessage(content, type) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (type === 'user') {
                msgDiv.classList.add('user-message');
                content = '🧑 ' + content;
            } else if (type === 'bot') {
                msgDiv.classList.add('bot-message');
                content = '🤖 ' + content;
            } else {
                msgDiv.classList.add('error-message');
            }
            msgDiv.textContent = content;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
